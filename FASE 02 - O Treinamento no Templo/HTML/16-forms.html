<!--forms
    capturar dados de entrada
    input -> entrada
    acation -> define para qual url sera enviado os daods, vazio envia para mesma url
    method
     -get
     -post

-->
 <form action="" method="get" enctype="multipart/form-data">
    <h1> Digite seu Endereço</h1>
    <label> 
        Rua:
        <input type="text" name="rua" autocomplete="street-address"/>       
    </label>

    <label>
        Números:
        <input type="text" name="numero" autocomplete="address-line2">
    </label>
    
    <label>
        Foto:
        <input type="file" name="arquivo"/>
    </label>

    <button type="submit"> Enviar dados</button>
    <button type="reset">Reset</button>
  

 </form>
